<title>Celebration — As Shipped</title>
<style>
  :root {
    --bg: #eef0f3; --surface: #ffffff; --ink: #16191e; --ink2: #5c6470;
    --line: #dde1e7; --accent: #2757d6; --on-accent: #fff; --gold: #e4b13c; --stamp: #b8901f;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0e1116; --surface: #171c24; --ink: #e9ecf1; --ink2: #99a2b0; --line: #2a313d; --accent: #5d87f5; --stamp: #e4b13c; }
  }
  :root[data-theme="light"] { --bg: #eef0f3; --surface: #ffffff; --ink: #16191e; --ink2: #5c6470; --line: #dde1e7; --accent: #2757d6; --stamp: #b8901f; }
  :root[data-theme="dark"] { --bg: #0e1116; --surface: #171c24; --ink: #e9ecf1; --ink2: #99a2b0; --line: #2a313d; --accent: #5d87f5; --stamp: #e4b13c; }

  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .picker {
    position: sticky; top: 0; z-index: 10; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    padding: 12px 16px; background: var(--bg); border-bottom: 1px solid var(--line);
  }
  .picker button {
    font: inherit; font-size: .85rem; font-weight: 600; padding: 8px 14px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--surface); color: var(--ink2); cursor: pointer;
  }
  .picker button.on { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  .picker .hint { width: 100%; text-align: center; color: var(--ink2); font-size: .78rem; }

  .celebrate {
    position: relative; overflow: hidden; min-height: 88vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 24px 18px;
  }
  .celebrate h1 { font-size: 1.65rem; letter-spacing: -.02em; margin: 0; text-align: center; z-index: 2; }
  .celebrate .sub { color: var(--ink2); margin: 0; text-align: center; font-size: .95rem; z-index: 2; }
  .btn {
    font: inherit; font-weight: 600; font-size: .95rem; min-height: 46px; padding: 0 26px;
    border-radius: 12px; cursor: pointer; border: none;
    background: var(--accent); color: var(--on-accent); z-index: 2; min-width: 200px;
  }
  .confetti { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 1; }
  .confetti i {
    position: absolute; top: -3vh; display: block;
    width: 9px; height: 14px; border-radius: 2px;
    animation: confetti-fall linear infinite;
  }
  @keyframes confetti-fall { to { transform: translateY(105vh) rotate(720deg); } }
  .rays {
    position: absolute; width: 150vmax; height: 150vmax; z-index: 0; border-radius: 50%;
    background: repeating-conic-gradient(var(--gold) 0deg 9deg, transparent 9deg 24deg);
    opacity: .13;
    animation: rays-spin 26s linear infinite;
  }
  @keyframes rays-spin { to { transform: rotate(360deg); } }
  .medalwrap {
    z-index: 2; display: flex; flex-direction: column; align-items: center;
    animation: medal-drop .6s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes medal-drop { from { transform: translateY(-60vh); } to { transform: none; } }
  .ribbon {
    width: 0; height: 0; border-left: 34px solid transparent; border-right: 34px solid transparent;
    border-top: 74px solid var(--accent); margin-bottom: -26px;
  }
  .medal {
    width: min(62vw, 260px); height: min(62vw, 260px); border-radius: 50%;
    border: 10px solid var(--gold); overflow: hidden; background: var(--surface);
    box-shadow: 0 18px 50px rgba(0,0,0,.35), inset 0 0 0 4px rgba(255,255,255,.35);
    animation: medal-swing 3.4s .6s ease-in-out infinite;
    transform-origin: 50% -60px;
  }
  @keyframes medal-swing { 0%,100% { transform: rotate(2.4deg); } 50% { transform: rotate(-2.4deg); } }
  .medal img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 32%; display: block; }
  .stamp {
    z-index: 2; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; font-size: .78rem;
    color: var(--stamp); border: 2px solid var(--stamp); border-radius: 8px; padding: 6px 12px;
    transform: rotate(-4deg);
  }
  @media (prefers-reduced-motion: reduce) {
    .confetti { display: none; }
    .rays, .medal, .medalwrap { animation: none; }
  }
</style>

  };
  const img = document.querySelector('img.dog');
  const setPhoto = (p) => {
    img.src = PHOTOS[p];
    img.style.objectPosition = p === 'eyes' ? '50% 36%' : '50% 30%';
    document.querySelectorAll('.picker button').forEach((b) => b.classList.toggle('on', b.dataset.photo === p));
    replay();
  };

  const COLORS = ['#2757d6', '#e4b13c', '#1e8e4e', '#c6373c', '#5d87f5', '#f0b35c'];
  const rain = document.querySelector('.confetti');
  let bits = '';
  for (let i = 0; i < 60; i++) {
    const left = (i * 137.5) % 100;
    const delay = (((i * 61) % 100) / 100) * 2.4;
    const dur = 2.6 + (((i * 37) % 100) / 100) * 2.2;
    const w = 6 + (i % 3) * 3;
    bits += `<i style="left:${left}vw;background:${COLORS[i % COLORS.length]};width:${w}px;animation-duration:${dur}s;animation-delay:${delay}s"></i>`;
  }
  rain.innerHTML = bits;

  function replay() {
    const wrap = document.querySelector('.medalwrap');
    wrap.style.animation = 'none';
    void wrap.offsetWidth;
    wrap.style.animation = '';
  }
  document.querySelectorAll('.picker button').forEach((b) => b.addEventListener('click', () => setPhoto(b.dataset.photo)));
  document.getElementById('replay').addEventListener('click', replay);
  setPhoto('snow');
</script>
